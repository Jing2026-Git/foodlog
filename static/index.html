<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍚 饭记 - 你的饮食日记</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#FF6B35;--primary-dark:#E55A2B;--primary-light:#FFE8DE;
  --primary-gradient:linear-gradient(135deg,#FF6B35 0%,#FF9558 100%);
  --text:#1A1614;--text-light:#6B6660;--text-muted:#B5B0A8;
  --bg:#FAF7F2;--card-bg:#FFFFFF;--border:#EDE8E0;--dashed:#D4C9B8;
  --success:#00B894;--success-light:#E0F8F4;
  --warning:#F39C12;--warning-light:#FEF3E0;
  --danger:#E74C3C;--danger-light:#FDECEA;
  --info:#3498DB;--info-light:#E8F4FD;
  --radius:12px;--radius-sm:8px;
  --shadow:0 2px 12px rgba(26,22,20,0.06);--shadow-lg:0 8px 32px rgba(26,22,20,0.12);
  --nav-h:60px;--max-w:960px;
  --font-hand:'Caveat',cursive;--font-body:'Patrick Hand','PingFang SC','Microsoft YaHei',sans-serif;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;background-image:radial-gradient(circle at 20% 30%,rgba(255,107,53,0.03) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(139,94,60,0.03) 0%,transparent 50%);}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:inherit;font-size:inherit;outline:none}
.hidden{display:none!important}
.navbar{position:sticky;top:0;z-index:100;background:var(--card-bg);border-bottom:1px solid var(--border);height:var(--nav-h);display:flex;align-items:center;padding:0 24px;box-shadow:0 1px 8px rgba(0,0,0,0.03)}
.logo{font-size:26px;font-weight:700;color:var(--primary);white-space:nowrap;font-family:var(--font-hand)}
.nav-items{display:flex;gap:4px;margin-left:32px}
.nav-item{padding:8px 16px;border-radius:var(--radius-sm);font-size:14px;color:var(--text-light);font-weight:500;transition:all .2s;cursor:pointer;background:none}
.nav-item:hover{color:var(--primary);background:var(--primary-light)}
.nav-item.active{color:var(--primary);background:var(--primary-light);font-weight:600}
.nav-right{margin-left:auto;display:flex;gap:10px;align-items:center}
.btn{padding:8px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary-gradient);color:#fff;box-shadow:0 2px 8px rgba(255,107,53,0.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,107,53,0.4)}
.btn-secondary{background:var(--primary-light);color:var(--primary)}
.btn-secondary:hover{background:#FFD9CC}
.btn-ghost{background:transparent;color:var(--text-light);padding:8px 12px}
.btn-ghost:hover{color:var(--text);background:rgba(0,0,0,0.04)}
.btn-danger{background:var(--danger-light);color:var(--danger)}
.btn-danger:hover{background:#FBDAD5}
.btn-sm{padding:5px 12px;font-size:13px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.main-content{max-width:var(--max-w);margin:0 auto;padding:24px 20px 80px}
.page{display:none;animation:fadeIn .3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-title{font-size:22px;font-weight:700}
.page-subtitle{font-size:13px;color:var(--text-muted);margin-top:2px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--card-bg);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:6px;transition:transform .2s;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary-gradient)}
.stat-card:hover{transform:translateY(-2px)}
.stat-icon{font-size:24px}
.stat-label{font-size:12px;color:var(--text-muted)}
.stat-value{font-size:24px;font-weight:700;color:var(--text)}
.stat-unit{font-size:13px;color:var(--text-light);font-weight:400;margin-left:3px}
.evaluations{margin-bottom:20px;display:flex;flex-direction:column;gap:8px}
.eval-item{padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;display:flex;align-items:center;gap:8px}
.eval-warn{background:var(--warning-light);color:#B8740A;border-left:3px solid var(--warning)}
.eval-good{background:var(--success-light);color:#009378;border-left:3px solid var(--success)}
.eval-info{background:var(--info-light);color:#2070A8;border-left:3px solid var(--info)}
.meal-group{margin-bottom:20px}
.meal-group-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:15px;font-weight:600;color:var(--text)}
.meal-group-header .group-icon{font-size:18px}
.meal-group-header .group-stats{margin-left:auto;font-size:13px;color:var(--text-muted);font-weight:400}
.meal-card{background:var(--card-bg);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all .2s;border:1px solid transparent}
.meal-card:hover{border-color:var(--primary-light);box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.meal-card-left{flex:1;min-width:0}
.meal-name{font-size:15px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.meal-name .draft-badge{font-size:11px;background:var(--warning-light);color:var(--warning);padding:2px 6px;border-radius:4px;font-weight:500}
.meal-meta{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:13px;color:var(--text-light)}
.meal-meta span{display:inline-flex;align-items:center;gap:3px}
.meal-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag-chip{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--primary-light);color:var(--primary-dark);font-weight:500}
.meal-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:14px;background:transparent;color:var(--text-muted);transition:all .2s}
.icon-btn:hover{background:var(--bg);color:var(--text)}
.icon-btn.danger:hover{background:var(--danger-light);color:var(--danger)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state .empty-icon{font-size:56px;margin-bottom:16px;opacity:.6}
.empty-state .empty-text{font-size:15px;margin-bottom:20px}
.empty-state .empty-hint{font-size:13px;color:var(--text-muted)}
.loading{text-align:center;padding:40px 20px;color:var(--text-muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.section-card{background:var(--card-bg);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.section-title{font-size:16px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.chart{display:flex;align-items:flex-end;gap:6px;height:180px;padding:10px 0}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:6px;min-width:0}
.bar-value{font-size:11px;color:var(--text-light);font-weight:600;white-space:nowrap}
.bar{width:80%;max-width:36px;background:var(--primary-gradient);border-radius:4px 4px 0 0;transition:height .6s cubic-bezier(.4,0,.2,1);min-height:3px;cursor:pointer;position:relative}
.bar:hover{filter:brightness(1.1)}
.bar.today{background:linear-gradient(180deg,#E74C3C 0%,#FF6B35 100%);box-shadow:0 0 8px rgba(231,76,60,0.3)}
.bar-label{font-size:11px;color:var(--text-muted);text-align:center;white-space:nowrap}
.bar-label .day-num{display:block;font-weight:600;color:var(--text-light)}
table.data-table{width:100%;border-collapse:collapse;font-size:14px}
.data-table th{text-align:left;padding:10px 12px;background:var(--bg);color:var(--text-light);font-weight:600;font-size:13px;border-bottom:1px solid var(--border)}
.data-table th:first-child{border-radius:var(--radius-sm) 0 0 0}
.data-table th:last-child{border-radius:0 var(--radius-sm) 0 0}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(255,107,53,0.03)}
.anomaly-item{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--warning-light);border-radius:var(--radius-sm);margin-bottom:6px;font-size:14px;color:#B8740A}
.anomaly-item .anomaly-date{font-size:12px;color:var(--text-muted);margin-left:auto;white-space:nowrap}
.compare-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.compare-item{text-align:center;padding:14px;background:var(--bg);border-radius:var(--radius-sm)}
.compare-label{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.compare-value{font-size:18px;font-weight:700}
.compare-value.up{color:var(--danger)}
.compare-value.down{color:var(--success)}
.compare-value.flat{color:var(--text-muted)}
.gap-card{padding:14px 16px;border-radius:var(--radius-sm);margin-bottom:8px;border-left:4px solid}
.gap-mild{background:var(--info-light);border-color:var(--info)}
.gap-moderate{background:var(--warning-light);border-color:var(--warning)}
.gap-severe{background:var(--danger-light);border-color:var(--danger)}
.gap-name{font-weight:600;margin-bottom:4px}
.gap-desc{font-size:13px;color:var(--text-light)}
.gap-bar{height:6px;background:rgba(0,0,0,0.06);border-radius:3px;margin-top:8px;overflow:hidden}
.gap-bar-fill{height:100%;border-radius:3px;transition:width .6s}
.reco-card{background:var(--card-bg);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px;border:1px solid var(--border)}
.reco-card:hover{border-color:var(--primary-light)}
.reco-text{font-size:14px;margin-bottom:10px;line-height:1.7}
.reco-meal{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg);border-radius:var(--radius-sm);font-size:13px}
.reco-meal .meal-icon{font-size:20px}
.reco-meal .meal-info{flex:1}
.reco-meal .meal-info .name{font-weight:600}
.reco-meal .meal-info .detail{color:var(--text-muted);font-size:12px}
.reco-reason{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:var(--primary-light);color:var(--primary-dark);margin-top:6px}
.reminder-item{padding:10px 14px;background:var(--info-light);border-radius:var(--radius-sm);margin-bottom:6px;font-size:14px;color:#2070A8;display:flex;align-items:center;gap:8px}
.history-controls{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.history-controls .control-group{display:flex;align-items:center;gap:6px}
.history-controls label{font-size:13px;color:var(--text-light);font-weight:500}
.history-controls input[type=date],.history-controls select{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card-bg);font-size:13px;color:var(--text)}
.history-day{margin-bottom:20px}
.history-day-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:16px;font-weight:600;padding-bottom:8px;border-bottom:2px solid var(--primary-light)}
.history-day-header .day-stats{margin-left:auto;font-size:13px;color:var(--text-muted);font-weight:400}
.history-meal{background:var(--card-bg);border-radius:var(--radius-sm);margin-bottom:6px;overflow:hidden;box-shadow:var(--shadow)}
.history-meal-head{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background .2s}
.history-meal-head:hover{background:var(--bg)}
.history-meal-head .hm-time{font-size:13px;color:var(--text-muted);min-width:45px}
.history-meal-head .hm-name{font-weight:600;flex:1;font-size:14px}
.history-meal-head .hm-cal{font-size:13px;color:var(--primary);font-weight:600}
.history-meal-head .hm-arrow{color:var(--text-muted);transition:transform .2s;font-size:12px}
.history-meal.expanded .hm-arrow{transform:rotate(180deg)}
.history-meal-detail{display:none;padding:0 16px 14px;border-top:1px solid var(--border);font-size:13px}
.history-meal.expanded .history-meal-detail{display:block}
.detail-row{display:flex;gap:8px;padding:6px 0}
.detail-row .dl{color:var(--text-muted);min-width:70px}
.detail-row .dv{color:var(--text);flex:1}
.detail-actions{margin-top:8px;display:flex;gap:8px}
.search-box{display:flex;gap:10px;margin-bottom:20px}
.search-box input{flex:1;padding:10px 16px;border:1px solid var(--border);border-radius:var(--radius);font-size:15px;background:var(--card-bg);transition:border-color .2s}
.search-box input:focus{border-color:var(--primary)}
.search-box .btn{padding:10px 22px}
.search-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.summary-card{background:var(--card-bg);border-radius:var(--radius);padding:14px;text-align:center;box-shadow:var(--shadow)}
.summary-card .sl{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.summary-card .sv{font-size:20px;font-weight:700;color:var(--primary)}
.search-result{background:var(--card-bg);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:6px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px}
.search-result .sr-date{font-size:12px;color:var(--text-muted);min-width:80px}
.search-result .sr-name{font-weight:600;flex:1;font-size:14px}
.search-result .sr-meta{font-size:13px;color:var(--text-light)}
.modal-overlay{position:fixed;inset:0;background:rgba(45,52,54,0.5);backdrop-filter:blur(2px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:overlayIn .2s ease}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--card-bg);border-radius:var(--radius);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modalIn .25s cubic-bezier(.4,0,.2,1)}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card-bg);z-index:1;border-radius:var(--radius) var(--radius) 0 0}
.modal-title{font-size:17px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-muted);background:transparent}
.modal-close:hover{background:var(--bg);color:var(--text)}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--card-bg);border-radius:0 0 var(--radius) var(--radius)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field.full{grid-column:1/-1}
.form-field label{font-size:13px;color:var(--text-light);font-weight:500}
.form-field label .req{color:var(--danger)}
.form-field input,.form-field select,.form-field textarea{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card-bg);color:var(--text);font-size:14px;transition:border-color .2s}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,107,53,0.1)}
.form-field textarea{resize:vertical;min-height:60px}
.form-field .hint{font-size:11px;color:var(--text-muted)}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--primary);background:var(--primary-light)}
.upload-zone .uz-icon{font-size:48px;margin-bottom:12px}
.upload-zone .uz-text{font-size:15px;color:var(--text);font-weight:500;margin-bottom:4px}
.upload-zone .uz-hint{font-size:13px;color:var(--text-muted)}
.upload-preview{margin-top:12px}
.upload-preview img{max-width:100%;max-height:200px;border-radius:var(--radius-sm);display:block;margin:0 auto}
.upload-loading{text-align:center;padding:30px 20px}
.upload-loading .spinner{width:40px;height:40px}
.upload-loading .ul-text{margin-top:12px;font-size:14px;color:var(--text-light)}
.upload-loading .ul-sub{font-size:12px;color:var(--text-muted);margin-top:4px}
.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{padding:12px 22px;border-radius:var(--radius);font-size:14px;font-weight:500;color:#fff;box-shadow:var(--shadow-lg);animation:toastIn .3s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:8px;max-width:90vw}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.toast.fade-out{animation:toastOut .3s ease forwards}
@keyframes toastOut{to{opacity:0;transform:translateY(20px)}}
.toast-success{background:var(--success)}
.toast-error{background:var(--danger)}
.toast-info{background:var(--text)}
.onboarding{position:fixed;inset:0;background:var(--primary-gradient);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px}
.onboarding-card{background:var(--card-bg);border-radius:20px;padding:40px 36px;max-width:420px;width:100%;text-align:center;box-shadow:var(--shadow-lg)}
.onboarding-card .ob-icon{font-size:64px;margin-bottom:16px}
.onboarding-card .ob-title{font-size:26px;font-weight:700;margin-bottom:8px;color:var(--text)}
.onboarding-card .ob-desc{font-size:15px;color:var(--text-light);margin-bottom:28px;line-height:1.7}
.onboarding-card .ob-actions{display:flex;flex-direction:column;gap:12px}
.onboarding-card .ob-actions .btn{justify-content:center;padding:12px;font-size:15px}
.settings-warning{background:var(--warning-light);color:#B8740A;border-left:3px solid var(--warning);padding:14px 18px;border-radius:var(--radius-sm);margin-bottom:18px;display:flex;align-items:center;gap:10px;font-size:14px}
.settings-card{background:var(--card-bg);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:16px}
.settings-card .section-title{margin-bottom:18px}
.settings-form{display:flex;flex-direction:column;gap:16px}
.settings-form .form-field{gap:6px}
.settings-form .form-field label{font-size:13px;color:var(--text);font-weight:600}
.settings-form .form-field .hint{font-size:12px;color:var(--text-muted);margin-top:2px}
.settings-form .form-field input,.settings-form .form-field select{padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card-bg);color:var(--text);font-size:14px;transition:border-color .2s;width:100%}
.settings-form .form-field input:focus,.settings-form .form-field select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,107,53,0.1)}
.settings-actions{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.settings-status{margin-top:14px;padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;display:none;align-items:center;gap:8px}
.settings-status.show{display:flex}
.settings-status.success{background:var(--success-light);color:#009378;border-left:3px solid var(--success)}
.settings-status.error{background:var(--danger-light);color:var(--danger);border-left:3px solid var(--danger)}
.settings-status.loading{background:var(--info-light);color:#2070A8;border-left:3px solid var(--info)}
.settings-status .ss-spinner{width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
.api-key-wrap{position:relative}
.api-key-wrap .toggle-key{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);font-size:16px;padding:4px;cursor:pointer}
.api-key-wrap .toggle-key:hover{color:var(--text)}
.data-mgmt-actions{display:flex;gap:10px;flex-wrap:wrap}
@media(max-width:680px){
  .navbar{padding:0 12px}.-nav-items{display:none}.main-content{padding:16px 12px 90px}
  .stats-row{grid-template-columns:repeat(2,1fr)}.search-summary{grid-template-columns:repeat(2,1fr)}
  .compare-grid{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}
  .bottom-nav{display:flex!important}.page-header{flex-direction:column;align-items:flex-start}
  .modal{max-width:100%}.chart{height:140px;gap:3px}.bar-label{font-size:10px}.bar-value{font-size:10px}
  .nav-right .btn-text{display:none}.nav-right .btn{padding:8px 12px}
}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card-bg);border-top:1px solid var(--border);z-index:100;padding:6px 0;max-width:100%}
.bottom-nav-inner{display:flex;justify-content:space-around;max-width:var(--max-w);margin:0 auto}
.bottom-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 14px;font-size:11px;color:var(--text-muted);cursor:pointer;border:none;background:none;transition:color .2s}
.bottom-nav-item.active{color:var(--primary)}
.bottom-nav-item .bn-icon{font-size:20px}

/* ===== 手账风格 · 三视图样式 ===== */
/* 顶部工具栏：视图切换 + 日期导航 */
.record-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.view-switcher{display:inline-flex;background:var(--card-bg);border:2px solid var(--dashed);border-radius:999px;padding:3px;box-shadow:var(--shadow)}
.vs-btn{padding:6px 18px;font-size:18px;font-family:var(--font-hand);font-weight:600;color:var(--text-light);border-radius:999px;cursor:pointer;background:none;transition:all .2s;letter-spacing:.5px}
.vs-btn:hover{color:var(--primary)}
.vs-btn.active{background:var(--primary-gradient);color:#fff;box-shadow:0 2px 6px rgba(255,107,53,0.3)}
.date-nav{display:flex;align-items:center;gap:6px;background:var(--card-bg);border:2px dashed var(--dashed);border-radius:999px;padding:4px 6px;box-shadow:var(--shadow)}
.date-arrow{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-light);background:none;cursor:pointer;transition:all .2s}
.date-arrow:hover{background:var(--primary-light);color:var(--primary)}
.date-label{font-family:var(--font-hand);font-size:22px;font-weight:600;color:var(--text);min-width:160px;text-align:center;cursor:pointer;padding:2px 8px;border-radius:var(--radius-sm);transition:background .2s}
.date-label:hover{background:var(--primary-light)}
.date-label .date-weekday{font-size:14px;color:var(--text-muted);font-family:var(--font-body);font-weight:400;margin-left:4px}

/* 当日摘要（日视图顶部数字带） */
.day-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;padding:16px;background:var(--card-bg);border:2px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);position:relative}
.day-summary::before{content:'~';position:absolute;top:-14px;left:18px;background:var(--bg);padding:0 8px;font-family:var(--font-hand);font-size:22px;color:var(--primary);font-weight:700}
.ds-item{text-align:center;padding:4px 2px;position:relative}
.ds-item:not(:last-child)::after{content:'';position:absolute;right:-5px;top:20%;bottom:20%;width:1px;border-left:1px dashed var(--dashed)}
.ds-val{font-family:var(--font-hand);font-size:26px;font-weight:700;color:var(--primary);line-height:1.1;font-variant-numeric:tabular-nums}
.ds-val .ds-unit{font-size:13px;color:var(--text-muted);font-weight:400;margin-left:2px;font-family:var(--font-body)}
.ds-label{font-size:12px;color:var(--text-muted);margin-top:4px;letter-spacing:.5px}

/* 时间线（日视图） */
.timeline{position:relative;padding-left:80px;margin-top:8px}
.timeline::before{content:'';position:absolute;left:68px;top:8px;bottom:8px;border-left:2px dashed var(--dashed)}
.tl-item{position:relative;margin-bottom:18px;display:flex;align-items:flex-start}
.tl-time{position:absolute;left:-80px;top:6px;width:60px;text-align:right;font-family:var(--font-hand);font-size:18px;font-weight:600;color:var(--text-light);font-variant-numeric:tabular-nums}
.tl-dot{position:absolute;left:-18px;top:10px;width:14px;height:14px;border-radius:50%;background:var(--card-bg);border:3px solid var(--primary);box-shadow:0 0 0 4px var(--bg);z-index:1}
.tl-card{flex:1;background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s;position:relative}
.tl-card::before{content:'';position:absolute;left:-4px;top:14px;width:8px;height:8px;background:var(--card-bg);border-left:1.5px solid var(--border);border-bottom:1.5px solid var(--border);transform:rotate(45deg)}
.tl-card:hover{border-color:var(--primary);box-shadow:0 4px 16px rgba(255,107,53,0.12);transform:translateX(2px)}
.tl-card-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.tl-name{font-size:16px;font-weight:600;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-meal{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--primary-light);color:var(--primary-dark);font-weight:500;white-space:nowrap}
.tl-meta{display:flex;flex-wrap:wrap;gap:4px 12px;font-size:13px;color:var(--text-light);font-family:var(--font-body)}
.tl-meta .tl-cal{font-family:var(--font-hand);font-size:16px;font-weight:600;color:var(--primary);font-variant-numeric:tabular-nums}
.tl-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}

/* 标签筛选条 */
.tag-filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.tag-filter-bar .tf-label{font-family:var(--font-hand);font-size:18px;color:var(--text-muted);margin-right:4px}
.tf-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 14px;border-radius:999px;border:2px dashed var(--dashed);background:var(--card-bg);font-size:14px;color:var(--text-light);cursor:pointer;transition:all .2s;font-family:var(--font-body)}
.tf-chip:hover{border-color:var(--primary);color:var(--primary)}
.tf-chip.active{border-style:solid;color:#fff;font-weight:600}
.tf-chip .tf-icon{font-size:15px}

/* 周视图 7 列网格 */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:8px}
.wg-col{background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 6px;min-height:180px;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:all .2s}
.wg-col.today{border-color:var(--primary);background:var(--primary-light)}
.wg-col:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.wg-header{text-align:center;padding-bottom:6px;border-bottom:1px dashed var(--dashed);margin-bottom:6px}
.wg-day{font-size:11px;color:var(--text-muted);font-weight:500}
.wg-date{font-family:var(--font-hand);font-size:22px;font-weight:700;color:var(--text);line-height:1;font-variant-numeric:tabular-nums}
.wg-col.today .wg-date{color:var(--primary)}
.wg-meals{display:flex;flex-direction:column;gap:5px;flex:1;overflow:hidden}
.wg-meal{padding:5px 6px;border-radius:var(--radius-sm);background:var(--bg);font-size:12px;cursor:pointer;transition:all .2s;border-left:3px solid var(--primary)}
.wg-meal:hover{background:var(--primary-light);transform:translateX(2px)}
.wg-meal-time{font-size:10px;color:var(--text-muted);font-variant-numeric:tabular-nums}
.wg-meal-name{font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px}
.wg-meal-cal{font-family:var(--font-hand);font-size:13px;color:var(--primary);font-weight:600;font-variant-numeric:tabular-nums}
.wg-empty{font-size:11px;color:var(--text-muted);text-align:center;padding:8px 0;font-family:var(--font-body)}

/* 筛选统计条 */
.filter-summary{margin-top:14px;padding:10px 14px;background:var(--card-bg);border:1.5px dashed var(--dashed);border-radius:var(--radius);font-size:14px;color:var(--text-light);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-summary .fs-icon{font-size:16px}
.filter-summary .fs-count{font-family:var(--font-hand);font-size:18px;font-weight:700;color:var(--primary)}

/* 月视图月历 */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:8px}
.mg-weekday{text-align:center;font-size:13px;font-weight:600;color:var(--text-muted);padding:6px 0;font-family:var(--font-hand)}
.mg-cell{aspect-ratio:1/1;background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:6px 4px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;min-height:62px}
.mg-cell:hover{border-color:var(--primary);background:var(--primary-light)}
.mg-cell.empty{background:transparent;border:1.5px dashed transparent;cursor:default}
.mg-cell.empty:hover{background:transparent}
.mg-cell.today{border-color:var(--primary);background:var(--primary-light)}
.mg-cell.has-data{border-style:solid}
.mg-date{font-family:var(--font-hand);font-size:18px;font-weight:700;color:var(--text);line-height:1;font-variant-numeric:tabular-nums}
.mg-cell.today .mg-date{color:var(--primary)}
.mg-cell.empty .mg-date{color:var(--text-muted);opacity:.4}
.mg-count{font-size:10px;color:var(--text-muted);font-variant-numeric:tabular-nums}
.mg-dots{display:flex;gap:3px;margin-top:auto}
.mg-dot{width:6px;height:6px;border-radius:50%}

/* 浮动添加按钮（FAB） */
.fab{position:fixed;bottom:80px;right:24px;width:54px;height:54px;border-radius:50%;background:var(--primary-gradient);color:#fff;font-size:28px;font-weight:300;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(255,107,53,0.4);cursor:pointer;z-index:50;transition:all .2s;border:3px solid var(--card-bg)}
.fab:hover{transform:translateY(-2px) rotate(90deg);box-shadow:0 8px 24px rgba(255,107,53,0.5)}
.fab:active{transform:translateY(0) rotate(90deg)}

/* 日视图空状态（手绘感） */
.record-empty{text-align:center;padding:50px 20px;color:var(--text-muted)}
.record-empty .re-icon{font-size:64px;margin-bottom:14px;opacity:.7}
.record-empty .re-title{font-family:var(--font-hand);font-size:24px;color:var(--text-light);margin-bottom:6px}
.record-empty .re-hint{font-size:14px;color:var(--text-muted);margin-bottom:18px}
.record-empty .re-doodle{font-size:24px;color:var(--dashed);letter-spacing:8px;margin:10px 0}

/* 响应式 */
@media(max-width:680px){
  .view-switcher{order:2;width:100%;justify-content:center}
  .record-toolbar{gap:8px}
  .date-label{min-width:120px;font-size:18px}
  .day-summary{grid-template-columns:repeat(2,1fr);gap:6px}
  .ds-item:nth-child(2)::after{display:none}
  .timeline{padding-left:64px}
  .timeline::before{left:54px}
  .tl-time{left:-64px;width:48px;font-size:15px}
  .week-grid{grid-template-columns:1fr;gap:6px}
  .wg-col{min-height:auto;flex-direction:row;align-items:center;padding:8px 10px}
  .wg-header{padding-bottom:0;border-bottom:none;border-right:1px dashed var(--dashed);padding-right:10px;margin-right:8px;margin-bottom:0;min-width:50px;text-align:left}
  .wg-meals{flex-direction:row;flex-wrap:wrap;gap:4px}
  .wg-meal{flex:0 0 auto;min-width:0;max-width:140px}
  .month-grid{gap:3px}
  .mg-cell{min-height:48px;padding:4px 2px}
  .mg-date{font-size:15px}
  .fab{bottom:74px;right:16px;width:48px;height:48px;font-size:24px}
}
</style>
</head>

<script>
/* 饭记 - 纯前端静态版（数据存 localStorage，AI 识别直接从浏览器调用 API） */

/* ==================== 常量 ==================== */
const MEAL_TYPE_LABELS={breakfast:'早餐',lunch:'午餐',dinner:'晚餐',snack:'加餐'};
const MEAL_TYPE_ICONS={breakfast:'🌅',lunch:'☀️',dinner:'🌙',snack:'🍵'};

const MAIN_MEAL_TYPES=['breakfast','lunch','dinner'];
const MEAL_TYPE_NAMES={breakfast:'早餐',lunch:'午餐',dinner:'晚餐',snack:'加餐'};
const STAPLE_FOOD_LABELS={'':'-- 无 --','米饭':'米饭','包子饺子':'包子饺子','粗粮低GI':'粗粮低GI','汤面汤粉':'汤面汤粉','汉堡披萨':'汉堡披萨'};
const MEAT_TYPE_LABELS={'':'-- 无 --','鱼虾':'鱼虾','猪肉':'猪肉','鸡鸭':'鸡鸭','牛羊':'牛羊','奶类':'奶类','蛋or植物':'蛋or植物'};
const VEGETABLE_TYPE_LABELS={'':'-- 无 --','叶子菜':'叶子菜','菌菇':'菌菇','瓜果茄':'瓜果茄','根茎类':'根茎类','豆类':'豆类','藻类':'藻类'};
const TASTE_LABELS={'':'-- 无 --','清淡':'清淡','重口':'重口','油':'油','辣':'辣','甜':'甜','咸':'咸'};
const FOOD_CATEGORY_LABELS={'':'-- 无 --','主食':'主食','肉类':'肉类','蔬菜':'蔬菜','饮品':'饮品','水果':'水果','其他':'其他'};
// 成人日均推荐摄入量（与 recommender.py 一致）
const RECOMMENDED_INTAKE={
  calories:{display_name:'热量',value:2000.0,unit:'kcal'},
  protein:{display_name:'蛋白质',value:60.0,unit:'g'},
  carbs:{display_name:'碳水',value:250.0,unit:'g'},
  fat:{display_name:'脂肪',value:70.0,unit:'g'},
};

/* ==================== 工具函数 ==================== */
function $(s,p=document){return p.querySelector(s)}
function $$(s,p=document){return p.querySelectorAll(s)}
function escapeHtml(s){if(s==null) return '';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function parseDate(s){const [y,m,d]=String(s).split('-').map(Number);return new Date(y,(m||1)-1,d||1);}
function fmtDateISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(dateStr,n){const d=parseDate(dateStr);d.setDate(d.getDate()+n);return fmtDateISO(d);}
function getMonday(dateStr){const d=parseDate(dateStr);const day=d.getDay();const diff=(day+6)%7;d.setDate(d.getDate()-diff);return fmtDateISO(d);}
function dateKey(d){if(!d) return 0;const digits=String(d).slice(0,10).replace(/[^0-9]/g,'');return digits?parseInt(digits,10):0;}
function formatDate(dateStr){
  if(!dateStr) return '';
  const today=new Date();today.setHours(0,0,0,0);
  const d=parseDate(dateStr);d.setHours(0,0,0,0);
  const diff=Math.round((today-d)/(86400000));
  if(diff===0) return '今天';if(diff===1) return '昨天';if(diff===-1) return '明天';
  return (d.getMonth()+1)+'月'+d.getDate()+'日';
}
function weekdayLabel(dateStr){const days=['周日','周一','周二','周三','周四','周五','周六'];return days[parseDate(dateStr).getDay()];}
function round1(v){return Math.round((Number(v||0))*10)/10}
function fmtCal(v){return Math.round(Number(v||0))}
function fmtPrice(v){return Number(v||0).toFixed(1)}
function fmtNum(v){v=round1(v);return v===Math.round(v)?String(v):v.toFixed(1);}
function fmtNumClean(v){if(v==null) v=0;v=round1(v);return v===Math.round(v)?String(v):v.toFixed(1);}
function mealTypeLabel(mt){return MEAL_TYPE_LABELS[mt]||mt}
function mealTypeIcon(mt){return MEAL_TYPE_ICONS[mt]||'🍽️'}
function sourceLabel(s){return SOURCE_LABELS[s]||s}
function sourceIcon(s){return SOURCE_ICONS[s]||'🍴'}
function nowISO(){const d=new Date();const off=d.getTimezoneOffset();const local=new Date(d.getTime()-off*60000);return local.toISOString().replace('T',' ').slice(0,19);}

/* ==================== 数据存储层（localStorage） ==================== */
const DB={
  MEALS_KEY:'foodlog_meals',CONFIG_KEY:'foodlog_ai_config',ONBOARDED_KEY:'foodlog_onboarded',SEQ_KEY:'foodlog_meal_seq',
  _read(key,def){try{const raw=localStorage.getItem(key);return raw?JSON.parse(raw):def;}catch(e){return def;}},
  _write(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){showToast('本地存储失败，可能空间不足','error');}},
  getMeals(){return this._read(this.MEALS_KEY,[]);},
  saveMeals(meals){this._write(this.MEALS_KEY,meals);},
  _nextId(){const cur=parseInt(localStorage.getItem(this.SEQ_KEY)||'0',10);const meals=this.getMeals();const maxId=meals.reduce((mx,m)=>Math.max(mx,m.id||0),0);const next=Math.max(cur,maxId)+1;localStorage.setItem(this.SEQ_KEY,String(next));return next;},
  addMeal(meal){const meals=this.getMeals();const now=nowISO();meal.id=this._nextId();if(!meal.created_at) meal.created_at=now;meal.updated_at=now;meals.push(meal);this.saveMeals(meals);return meal;},
  updateMeal(id,updates){const meals=this.getMeals();const idx=meals.findIndex(m=>m.id===id);if(idx<0) return false;meals[idx]={...meals[idx],...updates,id:id,updated_at:nowISO()};this.saveMeals(meals);return true;},
  deleteMeal(id){const meals=this.getMeals().filter(m=>m.id!==id);this.saveMeals(meals);return true;},
  getMealById(id){return this.getMeals().find(m=>m.id===id)||null;},
  getMealsByDate(dateStr){return this.getMeals().filter(m=>m.date===dateStr).sort((a,b)=>{if(!a.time&&!b.time) return a.id-b.id;if(!a.time) return 1;if(!b.time) return -1;return a.time.localeCompare(b.time);});},
  getMealsByDateRange(start,end){return this.getMeals().filter(m=>m.date>=start&&m.date<=end).sort((a,b)=>{if(a.date!==b.date) return a.date.localeCompare(b.date);if(!a.time&&b.time) return 1;if(a.time&&!b.time) return -1;if(a.time&&b.time) return a.time.localeCompare(b.time);return a.id-b.id;});},
  getConfirmedMeals(){return this.getMeals().filter(m=>m.status==='confirmed').sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||'')||(b.id-a.id));},
  getMealCount(){return this.getMeals().length;},
  clearAll(){localStorage.removeItem(this.MEALS_KEY);localStorage.removeItem(this.SEQ_KEY);},
  getConfig(){return this._read(this.CONFIG_KEY,{provider:'',api_key:'',base_url:'',model:''});},
  saveConfig(cfg){this._write(this.CONFIG_KEY,cfg);},
  isOnboarded(){return localStorage.getItem(this.ONBOARDED_KEY)==='1';},
  setOnboarded(){localStorage.setItem(this.ONBOARDED_KEY,'1');},
};

/* ==================== 统计分析（移植 stats.py） ==================== */
function aggregateTags(meals){
  const agg={};
  meals.forEach(m=>{
    if(!m.tags) return;
    String(m.tags).split(',').forEach(rawTag=>{
      const tag=rawTag.trim();if(!tag) return;
      if(!agg[tag]) agg[tag]={count:0,total_price:0.0};
      agg[tag].count+=1;agg[tag].total_price+=Number(m.price||0);
    });
  });
  Object.keys(agg).forEach(k=>{agg[k].total_price=round1(agg[k].total_price);});
  return agg;
}
// 营养评价（与 evaluate_nutrition 一致）
function evaluateNutrition(meals,totalCalories,totalProtein,totalCarbs,totalFat,tags){
  if(!meals||!meals.length) return [];
  const evaluations=[];
  const totalPrice=meals.reduce((s,m)=>s+Number(m.price||0),0);
  const hasVegetable=meals.some(m=>m.food_category==='蔬菜');
  const hasFruit=meals.some(m=>m.food_category==='水果');
  if(totalProtein<60) evaluations.push('蛋白质不足，建议补充肉蛋奶');
  if(!hasVegetable) evaluations.push('今天没吃蔬菜，建议补充');
  const drinkCount=DRINK_TAGS.reduce((s,t)=>s+((tags[t]||{}).count||0),0);
  if(drinkCount>=2) evaluations.push('今天饮料有点多');
  meals.forEach(m=>{if(Number(m.calories||0)>1000){evaluations.push('这顿热量较高：'+m.food_name+'（'+fmtNumClean(m.calories)+'kcal）');}});
  if(totalPrice>100) evaluations.push('今天餐饮花费较高（￥'+fmtNumClean(totalPrice)+'）');
  if(totalCalories<1200) evaluations.push('今天吃得太少了，注意营养均衡');
  if(totalCalories>2500) evaluations.push('今天热量摄入偏高');
  if(hasFruit) evaluations.push('今天吃了水果，不错！');
  if(hasVegetable) evaluations.push('蔬菜摄入达标，继续保持');
  return evaluations;
}
// 每日汇总（与 daily_summary 一致）
function dailySummary(dateStr){
  if(!dateStr) dateStr=todayStr();
  const meals=DB.getMealsByDate(dateStr);
  const total_calories=round1(meals.reduce((s,m)=>s+Number(m.calories||0),0));
  const total_protein=round1(meals.reduce((s,m)=>s+Number(m.protein||0),0));
  const total_carbs=round1(meals.reduce((s,m)=>s+Number(m.carbs||0),0));
  const total_fat=round1(meals.reduce((s,m)=>s+Number(m.fat||0),0));
  const total_price=round1(meals.reduce((s,m)=>s+Number(m.price||0),0));
  const tags=aggregateTags(meals);
  const by_meal_type={};
  MEAL_TYPES_ORDER.forEach(mt=>{by_meal_type[mt]={calories:0.0,price:0.0,items:[]};});
  meals.forEach(m=>{const mt=m.meal_type;if(!by_meal_type[mt]) by_meal_type[mt]={calories:0.0,price:0.0,items:[]};by_meal_type[mt].calories+=Number(m.calories||0);by_meal_type[mt].price+=Number(m.price||0);by_meal_type[mt].items.push(m);});
  Object.keys(by_meal_type).forEach(mt=>{by_meal_type[mt].calories=round1(by_meal_type[mt].calories);by_meal_type[mt].price=round1(by_meal_type[mt].price);});
  const evaluations=evaluateNutrition(meals,total_calories,total_protein,total_carbs,total_fat,tags);
  return {date:dateStr,total_calories,total_protein,total_carbs,total_fat,total_price,meal_count:meals.length,meals,tags,by_meal_type,evaluations};
}
// 周报汇总（与 weekly_summary 一致）
function weeklySummary(weekStart){
  const startStr=weekStart?weekStart:getMonday(todayStr());
  const endStr=addDays(startStr,6);
  const meals=DB.getMealsByDateRange(startStr,endStr);
  const byDate={};
  meals.forEach(m=>{(byDate[m.date]=byDate[m.date]||[]).push(m);});
  const daily_data=[];
  let total_calories=0.0,total_price=0.0,total_protein=0.0;
  for(let i=0;i<7;i++){
    const d=addDays(startStr,i);const dayMeals=byDate[d]||[];
    const dc=round1(dayMeals.reduce((s,m)=>s+Number(m.calories||0),0));
    const dp=round1(dayMeals.reduce((s,m)=>s+Number(m.price||0),0));
    const dpr=round1(dayMeals.reduce((s,m)=>s+Number(m.protein||0),0));
    daily_data.push({date:d,calories:dc,price:dp,meal_count:dayMeals.length,protein:dpr});
    total_calories+=dc;total_price+=dp;total_protein+=dpr;
  }
  total_calories=round1(total_calories);total_price=round1(total_price);total_protein=round1(total_protein);
  const days_with_records=[...new Set(meals.map(m=>m.date))].length;
  const avg_daily_calories=days_with_records>0?round1(total_calories/days_with_records):0;
  const avg_daily_price=days_with_records>0?round1(total_price/days_with_records):0;
  const avg_protein=days_with_records>0?round1(total_protein/days_with_records):0;
  const tags=aggregateTags(meals);
  const protein_stats=getProteinStats(meals);
  const vegetable_stats=getVegetableDailyStats(meals,startStr,endStr);
  const staple_stats=getStapleStats(meals);
  const drink_stats=getDrinkStats(meals);
  const anomalies=[];
  meals.forEach(m=>{if(Number(m.calories||0)>1000){anomalies.push({type:'high_calorie',date:m.date,description:'单餐热量较高（'+fmtNumClean(m.calories)+'kcal）',meal:m});}});
  daily_data.forEach(d=>{if(d.price>100){anomalies.push({type:'high_spend',date:d.date,description:'日餐饮花费较高（￥'+fmtNumClean(d.price)+'）',meal:null});}});
  Object.keys(byDate).forEach(d=>{const dayTags=aggregateTags(byDate[d]);Object.keys(dayTags).forEach(tag=>{if(dayTags[tag].count>=2){anomalies.push({type:'frequent_tag',date:d,description:tag+'×'+dayTags[tag].count,meal:null});}});});
  const lastStart=addDays(startStr,-7);const lastEnd=addDays(startStr,-1);
  const lastMeals=DB.getMealsByDateRange(lastStart,lastEnd);
  let comparison;
  if(lastMeals.length){
    const lastCalories=lastMeals.reduce((s,m)=>s+Number(m.calories||0),0);
    const lastPrice=lastMeals.reduce((s,m)=>s+Number(m.price||0),0);
    const lastProtein=lastMeals.reduce((s,m)=>s+Number(m.protein||0),0);
    const pct=(curr,prev)=>prev===0?null:round1((curr-prev)/prev*100);
    comparison={calories_change:pct(total_calories,lastCalories),price_change:pct(total_price,lastPrice),protein_change:pct(total_protein,lastProtein)};
  }else{comparison={calories_change:null,price_change:null,protein_change:null};}
  const evaluations=[];
  if(avg_protein<60) evaluations.push('本周蛋白质平均摄入不足');
  let maxStreak=0,streak=0;
  daily_data.forEach(d=>{const dayMeals=byDate[d.date]||[];if(!dayMeals.length) return;if(dayMeals.some(m=>m.food_category==='蔬菜')){streak=0;}else{streak+=1;if(streak>maxStreak) maxStreak=streak;}});
  if(maxStreak>=3) evaluations.push('本周蔬菜摄入太少');
  const drinkTotal=DRINK_TAGS.reduce((s,t)=>s+((tags[t]||{}).count||0),0);
  if(drinkTotal>7) evaluations.push('本周饮料摄入频繁');

/* ==================== 周报统计函数 ==================== */
function getProteinStats(meals){
  const counts={};
  const labels={'鱼虾':'鱼虾','猪肉':'猪肉','鸡鸭':'鸡鸭','牛羊':'牛羊','奶类':'奶类','蛋or植物':'蛋or植物'};
  meals.forEach(m=>{if(m.meat_type){m.meat_type.split(',').forEach(t=>{t=t.trim();if(labels[t]) counts[t]=(counts[t]||0)+1;});}});
  const total=Object.values(counts).reduce((a,b)=>a+b,0);
  return Object.keys(labels).map(k=>({name:labels[k],count:counts[k]||0,percent:total>0?round1((counts[k]||0)/total*100):0}));
}
function getVegetableDailyStats(meals,startDate,endDate){
  const daily={};
  for(let d=new Date(startDate);d<=new Date(endDate);d.setDate(d.getDate()+1)){
    const dateStr=formatDate(d);
    daily[dateStr]={hasVegetable:false,types:[]};
  }
  meals.forEach(m=>{if(m.vegetable_type&&daily[m.date]){daily[m.date].hasVegetable=true;daily[m.date].types=[...new Set([...daily[m.date].types,...m.vegetable_type.split(',').map(t=>t.trim())])];}});
  return daily;
}
function getStapleStats(meals){
  const counts={};
  const labels={'米饭':'米饭','包子饺子':'包子饺子','粗粮低GI':'粗粮低GI','汤面汤粉':'汤面汤粉','汉堡披萨':'汉堡披萨'};
  meals.forEach(m=>{if(m.staple_food&&labels[m.staple_food]) counts[m.staple_food]=(counts[m.staple_food]||0)+1;});
  const total=Object.values(counts).reduce((a,b)=>a+b,0);
  return Object.keys(labels).map(k=>({name:labels[k],count:counts[k]||0,percent:total>0?round1((counts[k]||0)/total*100):0}));
}
function getDrinkStats(meals){
  const counts={'奶茶':0,'咖啡':0,'果汁':0,'其他':0};
  meals.forEach(m=>{if(m.food_category==='饮品'){const tags=(m.tags||'').toLowerCase();if(tags.includes('奶茶')) counts['奶茶']++;else if(tags.includes('咖啡')) counts['咖啡']++;else if(tags.includes('果汁')) counts['果汁']++;else counts['其他']++;}});
  return counts;
}

/* ==================== 推荐引擎（移植 recommender.py） ==================== */
function severityOf(deficiency,recommended){if(recommended<=0) return 'mild';const ratio=deficiency/recommended;if(ratio>0.30) return 'severe';if(ratio>=0.10) return 'moderate';return 'mild';}
function analyzeNutrientGaps(meals7d){
  if(!meals7d||!meals7d.length) return [];
  const days=7;const gaps=[];
  Object.keys(RECOMMENDED_INTAKE).forEach(nutrient=>{
    const info=RECOMMENDED_INTAKE[nutrient];
    let total=0.0,hasData=false;
    meals7d.forEach(m=>{const v=m[nutrient];if(v!=null&&v!==''){total+=Number(v);hasData=true;}});
    if(!hasData) return;
    const avgIntake=round1(total/days);const recommended=info.value;const deficiency=round1(recommended-avgIntake);
    if(deficiency<=0) return;
    const unit=info.unit;const severity=severityOf(deficiency,recommended);
    gaps.push({nutrient,display_name:info.display_name,avg_intake:avgIntake,recommended,deficiency,severity,description:'近一周'+info.display_name+'日均摄入'+fmtNum(avgIntake)+unit+'，低于推荐的'+fmtNum(recommended)+unit});
  });
  gaps.sort((a,b)=>(b.deficiency/b.recommended)-(a.deficiency/a.recommended));
  return gaps;
}
function findMatchingMeals(gap,confirmedMeals){
  const nutrient=gap.nutrient;const displayName=gap.display_name;const unit=RECOMMENDED_INTAKE[nutrient].unit;
  const candidates=confirmedMeals.filter(m=>{const v=m[nutrient];return v!=null&&v!==''&&Number(v)>0;});
  if(!candidates.length) return [];
  const bestByName={};
  candidates.forEach(m=>{const ex=bestByName[m.food_name];if(!ex||(m.date||'')>=(ex.date||'')){bestByName[m.food_name]=m;}});
  const deduped=Object.values(bestByName);
  deduped.sort((a,b)=>{const na=Number(a[nutrient]||0),nb=Number(b[nutrient]||0);if(na!==nb) return nb-na;return dateKey(b.date)-dateKey(a.date);});
  const top=deduped.slice(0,3);const results=[];
  top.forEach(m=>{
    const nutrientValue=round1(Number(m[nutrient]));
    const priceStr=m.price!=null?'￥'+fmtNum(m.price):'';
    const pricePart=priceStr?priceStr+', ':'';
    results.push({meal:m,nutrient_value:nutrientValue,last_date:m.date,reason:'富含'+displayName+'（'+fmtNum(nutrientValue)+unit+'）',recommendation_text:"你之前点过'"+m.food_name+"'("+pricePart+'约'+fmtNum(nutrientValue)+unit+displayName+')，可以考虑再来一顿'});
  });
  return results;
}
function generateTodayReminders(todayMeals){
  const reminders=[];
  const recordedTypes=new Set(todayMeals.map(m=>m.meal_type));
  const missing=MAIN_MEAL_TYPES.filter(mt=>!recordedTypes.has(mt));
  if(todayMeals.length<3&&missing.length){const names=missing.map(mt=>MEAL_TYPE_NAMES[mt]||mt).join('、');reminders.push('你今天还没记'+names+'，别忘了记录');}
  if(!todayMeals.some(m=>m.food_category==='蔬菜')) reminders.push('今天还没吃蔬菜，记得补充点蔬菜');
  if(!todayMeals.some(m=>m.food_category==='水果')) reminders.push('今天还没吃水果，可以来点水果');
  return reminders;
}
function getRecommendations(){
  const today=todayStr();const start=addDays(today,-6);
  const meals7d=DB.getMealsByDateRange(start,today);
  const confirmedMeals=DB.getConfirmedMeals();
  const todayMeals=DB.getMealsByDate(today);
  const reminders=generateTodayReminders(todayMeals);
  if(meals7d.length<MIN_RECORDS_FOR_RECO){
    return {nutrient_gaps:[],recommendations:[],reminders:reminders,general_advice:GENERAL_ADVICE};
  }
  const gaps=analyzeNutrientGaps(meals7d);
  const recommendations=[];
  gaps.forEach(gap=>{findMatchingMeals(gap,confirmedMeals).forEach(match=>{recommendations.push({nutrient:gap.nutrient,display_name:gap.display_name,meal:match.meal,nutrient_value:match.nutrient_value,last_date:match.last_date,reason:match.reason,recommendation_text:match.recommendation_text});});});
  return {nutrient_gaps:gaps,recommendations:recommendations,reminders:reminders,general_advice:''};
}

/* ==================== 搜索（移植 /api/search） ==================== */
function searchMeals(query){
  if(!query||!query.trim()){return {query:query||'',results:[],summary:{total_count:0,total_price:0.0,total_calories:0,date_range:null}};}
  const lower=query.trim().toLowerCase();
  const meals=DB.getMeals().filter(m=>{
    const fields=[m.food_name,m.tags,m.notes,m.food_category,m.staple_food,m.meat_type,m.vegetable_type,m.taste].map(x=>x==null?'':String(x).toLowerCase());
    return fields.some(f=>f.indexOf(lower)>=0);
  });
  meals.sort((a,b)=>{if(a.date!==b.date) return b.date.localeCompare(a.date);if(!a.time&&b.time) return 1;if(a.time&&!b.time) return -1;if(a.time&&b.time) return b.time.localeCompare(a.time);return b.id-a.id;});
  const total_price=Math.round(meals.reduce((s,m)=>s+Number(m.price||0),0)*100)/100;
  const total_calories=Math.round(meals.reduce((s,m)=>s+Number(m.calories||0),0));
  let dateRange=null;
  if(meals.length){const dates=meals.map(m=>m.date).filter(Boolean).sort();dateRange={start:dates[0],end:dates[dates.length-1]};}
  return {query:query,results:meals,summary:{total_count:meals.length,total_price,total_calories,date_range:dateRange}};
}

// 图片压缩：等比缩小到 1920x1080 内，PNG 透明合成白底，转 JPEG q85，返回 base64（不含前缀）
function compressImage(file){
  return new Promise((resolve,reject)=>{
    if(!file.type.startsWith('image/')){reject(new Error('请选择图片文件'));return;}
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX_W=1024,MAX_H=1024;let w=img.width,h=img.height;
        if(w>MAX_W||h>MAX_H){const ratio=Math.min(MAX_W/w,MAX_H/h);w=Math.max(1,Math.round(w*ratio));h=Math.max(1,Math.round(h*ratio));}
        const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext('2d');ctx.fillStyle='#ffffff';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);
        try{const dataUrl=canvas.toDataURL('image/jpeg',0.7);resolve(dataUrl.split(',')[1]);}
        catch(err){reject(new Error('图片处理失败'));}
      };
      img.onerror=()=>reject(new Error('图片加载失败，可能格式不支持'));
      img.src=e.target.result;
    };
    reader.onerror=()=>reject(new Error('图片读取失败'));
    reader.readAsDataURL(file);
  });
}
function validateConfig(cfg){
  if(!cfg.provider) return '请选择 AI 提供商';
  if(!cfg.api_key) return '未配置 API Key，请在设置页面配置';
  if(!cfg.model) return '未配置模型名称';
  if(!cfg.base_url) return '未配置 Base URL';
  return null;
}
function buildApiUrl(baseUrl,path){if(baseUrl.endsWith('/v1')) return baseUrl+path;return baseUrl+'/v1'+path;}
async function callAI(imageB64,prompt,cfg){
  const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),90000);
  try{
    // 走同域 serverless 代理，避免 CORS 问题
    const resp=await fetch('/api/recognize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider:cfg.provider,api_key:cfg.api_key,base_url:cfg.base_url,model:cfg.model,prompt:prompt,image:imageB64}),signal:controller.signal});
    let data;
    try{data=await resp.json();}catch(e){throw new Error('AI代理服务返回了非JSON响应（HTTP '+resp.status+'），可能是函数超时或部署异常');}
    if(!resp.ok||data.error){
      let msg=data.error||('AI服务返回错误: '+resp.status);
      if(data.detail) msg+='\n详情: '+data.detail;
      throw new Error(msg);
    }
    return data.text||'';
  }catch(e){
    if(e.name==='AbortError') throw new Error('AI识别超时（90秒），请重试');
    if(e.message==='Failed to fetch') throw new Error('网络连接失败，请检查网络或代理服务是否正常');
    throw e;
  }finally{clearTimeout(timer);}
}
function parseAIResponse(text){
  if(!text) return null;const t=text.trim();
  try{const obj=JSON.parse(t);if(obj&&typeof obj==='object') return normalizeAIResult(obj);}catch(e){}
  const m1=t.match(/```(?:json)?\s*(\{[\s\S]*?\})\s*```/i);
  if(m1){try{const obj=JSON.parse(m1[1]);if(obj&&typeof obj==='object') return normalizeAIResult(obj);}catch(e){}}
  const m2=t.match(/\{[\s\S]*\}/);
  if(m2){try{const obj=JSON.parse(m2[0]);if(obj&&typeof obj==='object') return normalizeAIResult(obj);}catch(e){}}
  return null;
}
function normalizeAIResult(obj){
  const cleanStr=v=>{if(v==null) return '';const s=String(v).trim();return (s==='null'||s==='NULL'||s==='无'||s==='没有'||s==='none'||s==='N/A')?'':s;};
  const toFloat=v=>{if(v==null||v==='') return null;const n=Number(v);return isNaN(n)?null:n;};
  const toInt=v=>{if(v==null||v==='') return null;const n=parseInt(v,10);if(!isNaN(n)) return n;const f=parseFloat(v);return isNaN(f)?null:Math.round(f);};
  const sf=cleanStr(obj.staple_food);
  const mt=cleanStr(obj.meat_type);
  const vt=cleanStr(obj.vegetable_type);
  const t=cleanStr(obj.taste);
  return {
    food_name:cleanStr(obj.food_name),
    food_category:cleanStr(obj.food_category),
    staple_food:sf||null,meat_type:mt||null,vegetable_type:vt||null,taste:t||null,
    calories:toInt(obj.calories),protein:toFloat(obj.protein),carbs:toFloat(obj.carbs),fat:toFloat(obj.fat),price:toFloat(obj.price),
    source:cleanStr(obj.source),meal_type:cleanStr(obj.meal_type),tags:cleanStr(obj.tags),notes:cleanStr(obj.notes),
  };
}
async function recognizeScreenshot(file){
  const cfg=DB.getConfig();const err=validateConfig(cfg);
  if(err) return {success:false,error:err};
  let imageB64;
  try{imageB64=await compressImage(file);}catch(e){return {success:false,error:e.message};}
  let rawText;
  try{rawText=await callAI(imageB64,RECOGNIZE_PROMPT,cfg);}catch(e){return {success:false,error:e.message};}
  const parsed=parseAIResponse(rawText);
  if(!parsed) return {success:false,error:'AI返回格式异常（无法解析为JSON），原始响应：'+(rawText||'').slice(0,200),raw_response:rawText};
  return {success:true,data:parsed,raw_response:rawText};
}
async function testAIConnection(){
  const cfg=DB.getConfig();const err=validateConfig(cfg);
  if(err) return {success:false,message:err};
  const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),30000);
  try{
    // 走同域代理测试，避免 CORS 问题
    const resp=await fetch('/api/recognize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider:cfg.provider,api_key:cfg.api_key,base_url:cfg.base_url,model:cfg.model,test:true}),signal:controller.signal});
    let data;
    try{data=await resp.json();}catch(e){return {success:false,message:'AI代理服务返回了非JSON响应（HTTP '+resp.status+'），可能是部署异常'};}
    if(!resp.ok||data.error){
      let msg=data.error||('AI服务返回错误: '+resp.status);
      if(data.detail) msg+='\n详情: '+data.detail;
      return {success:false,message:msg};
    }
    return {success:true,message:'AI 配置测试成功！可以正常使用截图识别功能'};
  }catch(e){
    if(e.name==='AbortError') return {success:false,message:'请求超时，请重试'};
    if(e.message==='Failed to fetch') return {success:false,message:'网络连接失败，请检查网络或代理服务是否正常'};
    return {success:false,message:e.message};
  }finally{clearTimeout(timer);}
}

const TAG_FILTERS=[
  {key:'饮品',icon:'🥤',color:'#8B5E3C',bg:'#F5EDE3'},
  {key:'健康餐',icon:'🥗',color:'#2D7A4E',bg:'#E8F5ED'},
  {key:'高油/高纳',icon:'🌶️',color:'#C0392B',bg:'#FBEAE8'},

function mealMatchesTagFilter(m,tag){
  if(tag==='饮品') return m.food_category==='饮品';
  if(tag==='健康餐'){
    const t=(m.tags||'')+(m.food_name||'');
    return t.includes('健康餐')||t.includes('沙拉')||t.includes('轻食');
  }
  if(tag==='高油/高纳'){
    const t=(m.tags||'')+(m.taste||'');
    return t.includes('高油')||t.includes('高纳')||t.includes('油太多');
  }
  return false;
}
function filterMealsByTags(meals,tags){
  if(!tags||!tags.length) return meals;
  return meals.filter(m=>tags.some(t=>mealMatchesTagFilter(m,t)));
}

function openUploadModal(){

    const now=new Date();
    const draftMeal=DB.addMeal({
      date:todayStr(),time:String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'),

      price:resp.data.price,tags:resp.data.tags||null,notes:resp.data.notes||null,screenshot_path:null,ai_raw_response:resp.raw_response||'',status:'draft',
    });
    const draft=DB.getMealById(draftMeal.id);
    const body='<div style="margin-bottom:14px;padding:10px 14px;background:var(--success-light);border-radius:var(--radius-sm);font-size:13px;color:#009378;display:flex;align-items:center;gap:6px"><span>✓</span><span>AI识别成功！请核对并修正以下信息：</span></div>'+mealFormHtml(draft);

function exportData(){

  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='foodlog-'+todayStr()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('已导出 '+meals.length+' 条记录','success');
}
function importData(event){
  const file=event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      let meals;
      if(Array.isArray(data)) meals=data;
      else if(data&&Array.isArray(data.meals)) meals=data.meals;
      else throw new Error('文件格式不正确');
      if(!confirm('将导入 '+meals.length+' 条记录，会覆盖当前所有数据，确定继续吗？')){
        event.target.value='';return;
      }
      // 规范化字段并重新分配 id
      const clean=meals.map((m,i)=>{
        return {
          id:i+1,date:m.date,time:m.time||null,meal_type:m.meal_type,source:m.source,food_name:m.food_name,
          food_category:m.food_category||null,staple_food:m.staple_food||null,meat_type:m.meat_type||null,
          vegetable_type:m.vegetable_type||null,taste:m.taste||null,calories:m.calories,protein:m.protein,carbs:m.carbs,fat:m.fat,
          price:m.price,tags:m.tags||null,notes:m.notes||null,screenshot_path:m.screenshot_path||null,
          ai_raw_response:m.ai_raw_response||null,status:m.status||'confirmed',
          created_at:m.created_at||nowISO(),updated_at:m.updated_at||nowISO(),
        };
      });
      DB.saveMeals(clean);
      localStorage.setItem(DB.SEQ_KEY,String(clean.length));
      showToast('已导入 '+clean.length+' 条记录','success');
      event.target.value='';
      $('#meal-count-display')&&($('#meal-count-display').textContent=DB.getMealCount());
      if(state.currentPage==='record') loadRecord();
    }catch(err){
      showToast('导入失败：'+err.message,'error');
      event.target.value='';
    }
  };
  reader.onerror=()=>{showToast('文件读取失败','error');event.target.value='';};
  reader.readAsText(file);
}

  if(!confirm('再次确认：所有饮食记录都将被删除！')) return;
  DB.clearAll();
  showToast('所有数据已清空','success');
  $('#meal-count-display')&&($('#meal-count-display').textContent='0');
  switchPage('record');
}

/* ==================== 初始化引导 ==================== */
function checkInitAndStart(){
  // 首次访问（无记录且未引导过）显示引导页
  if(DB.getMealCount()===0 && !DB.isOnboarded()){
    $('#onboarding').classList.remove('hidden');
    $('#app').classList.add('hidden');
  }else{
    $('#onboarding').classList.add('hidden');
    $('#app').classList.remove('hidden');
    loadRecord();
  }
}
function initDemo(){
  try{
    showToast('正在加载示例数据...','info');
    const meals=generateSampleMeals();
    const now=nowISO();
    const withMeta=meals.map((m,i)=>({...m,id:i+1,created_at:now,updated_at:now}));
    DB.saveMeals(withMeta);
    localStorage.setItem(DB.SEQ_KEY,String(withMeta.length));
    DB.setOnboarded();
    showToast('示例数据已加载','success');
    $('#onboarding').classList.add('hidden');
    $('#app').classList.remove('hidden');
    loadRecord();
  }catch(e){
    showToast(e.message,'error');
  }
}
function startEmpty(){
  DB.setOnboarded();
  $('#onboarding').classList.add('hidden');
  $('#app').classList.remove('hidden');
  loadRecord();
}

/* ==================== 启动 ==================== */
document.addEventListener('DOMContentLoaded',checkInitAndStart);
</script>
</body>
</html>
